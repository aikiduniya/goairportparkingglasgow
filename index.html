    <script>
      (function () {
        var isThankYouPage =
          window.location.pathname === '/thankyou' ||
          window.location.pathname === '/booking/success';

        if (!isThankYouPage) return;

        var params = new URLSearchParams(window.location.search);
        var transactionId =
          params.get('ref_id') ||
          params.get('bookingId') ||
          params.get('new_reference') ||
          '';
        var totalParam =
          params.get('price') ||
          params.get('amount') ||
          params.get('total') ||
          params.get('cancel') ||
          '';
        var normalizedTotal = totalParam.replace(/[^\d.,-]/g, '').replace(',', '.');
        var transactionTotal = Number.parseFloat(normalizedTotal);

        if (!transactionId || Number.isNaN(transactionTotal)) return;

        window.dataLayer = window.dataLayer || [];

        var alreadyTracked = window.dataLayer.some(function (entry) {
          return entry && entry.transactionId === transactionId;
        });

        if (alreadyTracked) return;

        window.dataLayer.push({
          transactionId: transactionId,
          transactionTotal: transactionTotal
        });
      })();
    </script>
